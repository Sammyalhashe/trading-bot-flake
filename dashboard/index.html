<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Trading Bot - Backtest Results</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1621;
            color: #d1d4dc;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #787b86;
            margin-bottom: 30px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: #131722;
            border-radius: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-size: 12px;
            color: #787b86;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            padding: 10px;
            background: #1e222d;
            color: #d1d4dc;
            border: 1px solid #2a2e39;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        select:hover {
            border-color: #3a3e49;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: #131722;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2a2e39;
        }

        .metric-label {
            font-size: 11px;
            color: #787b86;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
        }

        .metric-value.positive {
            color: #26a69a;
        }

        .metric-value.negative {
            color: #ef5350;
        }

        #chart-container {
            height: 500px;
            background: #131722;
            border-radius: 8px;
            margin-bottom: 30px;
            padding: 20px;
        }

        #equity-chart {
            height: 100%;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #787b86;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #787b86;
        }

        .error {
            background: #2a1a1a;
            color: #ef5350;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ef5350;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Crypto Trading Bot</h1>
        <p class="subtitle">Interactive Backtest Results Dashboard</p>

        <div class="controls">
            <div class="control-group">
                <label>Market Period</label>
                <select id="period-select">
                    <option value="">Loading...</option>
                </select>
            </div>
            <div class="control-group">
                <label>Timeframe</label>
                <select id="timeframe-select">
                    <option value="">Select period first</option>
                </select>
            </div>
            <div class="control-group">
                <label>Strategy</label>
                <select id="strategy-select">
                    <option value="">Select timeframe first</option>
                </select>
            </div>
        </div>

        <div id="error-container"></div>

        <div class="metrics" id="metrics-container" style="display: none;">
            <div class="metric-card">
                <div class="metric-label">Total Return</div>
                <div class="metric-value" id="metric-return">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Sharpe Ratio</div>
                <div class="metric-value" id="metric-sharpe">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Max Drawdown</div>
                <div class="metric-value" id="metric-drawdown">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Win Rate</div>
                <div class="metric-value" id="metric-winrate">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Trades</div>
                <div class="metric-value" id="metric-trades">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Profit Factor</div>
                <div class="metric-value" id="metric-pf">-</div>
            </div>
        </div>

        <div id="chart-container" style="display: none;">
            <div id="equity-chart"></div>
        </div>

        <div class="footer">
            Built with <a href="https://www.tradingview.com/lightweight-charts/" style="color: #2962ff;">Lightweight Charts</a> | 
            Data from comprehensive backtesting suite
        </div>
    </div>

    <script>
        let manifest = [];
        let chart = null;
        let equitySeries = null;

        // Period descriptions
        const periodDescriptions = {
            'Q1_2024_Bull': 'Q1 2024 Bull Market (BTC $42k → $61k)',
            'Q2_2023_Sideways': 'Q2 2023 Sideways/Choppy',
            '2023_Full_Year': '2023 Full Year (Mixed)',
            'YTD_2025': '2025-2026 YTD (Recent)',
            'H2_2024': 'H2 2024 (Jul-Dec)'
        };

        // Load manifest
        fetch('data/manifest.json')
            .then(r => r.json())
            .then(data => {
                manifest = data;
                populatePeriods();
            })
            .catch(err => showError('Failed to load backtest data: ' + err));

        function populatePeriods() {
            const periods = [...new Set(manifest.map(m => m.period))];
            const select = document.getElementById('period-select');
            select.innerHTML = '<option value="">Select market period</option>' +
                periods.map(p => `<option value="${p}">${periodDescriptions[p] || p}</option>`).join('');
        }

        function populateTimeframes(period) {
            const timeframes = [...new Set(manifest.filter(m => m.period === period).map(m => m.timeframe))];
            const select = document.getElementById('timeframe-select');
            select.innerHTML = '<option value="">Select timeframe</option>' +
                timeframes.map(t => `<option value="${t}">${t}</option>`).join('');
            document.getElementById('strategy-select').innerHTML = '<option value="">Select timeframe first</option>';
        }

        function populateStrategies(period, timeframe) {
            const strategies = [...new Set(manifest
                .filter(m => m.period === period && m.timeframe === timeframe)
                .map(m => m.strategy))];
            const select = document.getElementById('strategy-select');
            select.innerHTML = '<option value="">Select strategy</option>' +
                strategies.map(s => `<option value="${s}">${s.replace('_', ' ')}</option>`).join('');
        }

        function loadBacktest(period, timeframe, strategy) {
            const result = manifest.find(m =>
                m.period === period && m.timeframe === timeframe && m.strategy === strategy
            );

            if (!result) {
                showError('Backtest not found');
                return;
            }

            // Show loading
            document.getElementById('metrics-container').style.display = 'none';
            document.getElementById('chart-container').style.display = 'none';

            // Load equity data
            fetch(result.files.equity)
                .then(r => r.json())
                .then(equityData => {
                    displayMetrics(result.metrics);
                    displayChart(equityData, result);
                })
                .catch(err => showError('Failed to load chart data: ' + err));
        }

        function displayMetrics(metrics) {
            document.getElementById('metric-return').textContent = `${metrics.total_return_pct >= 0 ? '+' : ''}${metrics.total_return_pct.toFixed(2)}%`;
            document.getElementById('metric-return').className = `metric-value ${metrics.total_return_pct >= 0 ? 'positive' : 'negative'}`;

            document.getElementById('metric-sharpe').textContent = metrics.sharpe_ratio.toFixed(2);
            document.getElementById('metric-drawdown').textContent = `${metrics.max_drawdown_pct.toFixed(2)}%`;
            document.getElementById('metric-winrate').textContent = `${metrics.win_rate_pct.toFixed(1)}%`;
            document.getElementById('metric-trades').textContent = metrics.num_trades;
            document.getElementById('metric-pf').textContent = metrics.profit_factor >= 999 ? '∞' : metrics.profit_factor.toFixed(2);

            document.getElementById('metrics-container').style.display = 'grid';
        }

        function displayChart(equityData, result) {
            // Initialize chart if needed
            if (!chart) {
                const chartDiv = document.getElementById('equity-chart');
                chart = LightweightCharts.createChart(chartDiv, {
                    layout: {
                        background: { color: '#131722' },
                        textColor: '#d1d4dc',
                    },
                    grid: {
                        vertLines: { color: '#1e222d' },
                        horzLines: { color: '#1e222d' },
                    },
                    timeScale: {
                        borderColor: '#2a2e39',
                        timeVisible: true,
                    },
                    rightPriceScale: {
                        borderColor: '#2a2e39',
                    },
                });
                equitySeries = chart.addLineSeries({
                    color: '#2962ff',
                    lineWidth: 2,
                });
            }

            // Convert data
            const chartData = equityData.timestamps.map((t, i) => ({
                time: Math.floor(new Date(t).getTime() / 1000),
                value: equityData.portfolio_value[i]
            }));

            equitySeries.setData(chartData);
            chart.timeScale().fitContent();

            document.getElementById('chart-container').style.display = 'block';
        }

        function showError(msg) {
            document.getElementById('error-container').innerHTML =
                `<div class="error">⚠️ ${msg}</div>`;
        }

        // Event listeners
        document.getElementById('period-select').addEventListener('change', e => {
            if (e.target.value) {
                populateTimeframes(e.target.value);
                document.getElementById('error-container').innerHTML = '';
            }
        });

        document.getElementById('timeframe-select').addEventListener('change', e => {
            const period = document.getElementById('period-select').value;
            if (period && e.target.value) {
                populateStrategies(period, e.target.value);
            }
        });

        document.getElementById('strategy-select').addEventListener('change', e => {
            const period = document.getElementById('period-select').value;
            const timeframe = document.getElementById('timeframe-select').value;
            if (period && timeframe && e.target.value) {
                loadBacktest(period, timeframe, e.target.value);
            }
        });
    </script>
</body>
</html>
