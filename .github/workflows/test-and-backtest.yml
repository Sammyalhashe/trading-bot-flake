name: Tests & Backtesting

on:
  push:
    branches: [master]
    paths:
      - '*.py'
      - 'core/**'
      - 'strategies/**'
      - 'config/**'
      - 'executors/**'
      - 'backtesting/**'
      - 'tests/**'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas numpy pyjwt cryptography pytest web3 websockets loguru

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  backtest:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        period:
          - Q1_2024_Bull
          - Q2_2023_Sideways
          - 2023_Full_Year
          - YTD_2025
          - H2_2024
        strategy:
          - trend_following
          - mean_reversion
          - supertrend
          - auto
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas numpy pyjwt cryptography web3 websockets loguru

      - name: Download historical data
        run: |
          python backtesting/comprehensive_backtest.py \
            --periods ${{ matrix.period }} \
            --strategies ${{ matrix.strategy }} \
            --timeframes 1h \
            --symbols BTC-USD

      - name: Upload backtest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ matrix.period }}-${{ matrix.strategy }}
          path: |
            data/results/
            equity_curve_*.csv
            trades_*.csv
          retention-days: 30

  backtest-summary:
    needs: backtest
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: backtest-*
          merge-multiple: true

      - name: Summary
        run: |
          echo "## Backtest Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Period | Strategy | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|--------|" >> $GITHUB_STEP_SUMMARY
          for f in $(find . -name "*_equity_curve.csv" 2>/dev/null | sort); do
            base=$(basename "$f" _equity_curve.csv)
            echo "| ${base} | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
          done
          if [ -z "$(find . -name "*_equity_curve.csv" 2>/dev/null)" ]; then
            echo "No equity curve files found. Check individual job logs." >> $GITHUB_STEP_SUMMARY
          fi
